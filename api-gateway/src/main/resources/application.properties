server.port=8090
spring.application.name=api-gateway

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Rate Limiter Configuration
rate-limiter.capacity=10
rate-limiter.refill-rate=2.0

# CDN / Cache Configuration
cdn.cache.enabled=true
cdn.cache.ttl-seconds=30
cdn.cache.max-entries=1000

# Backend Pool Configuration
gateway.backends=${GATEWAY_BACKENDS:http://localhost:8081,http://localhost:8082,http://localhost:8083}



