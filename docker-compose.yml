

services:
  redis:
    image: redis:7-alpine
    container_name: webinfra-redis
    ports:
      - "6379:6379"

  backend-1:
    build:
      context: ./backend-server
    container_name: webinfra-backend-1
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081

  backend-2:
    build:
      context: ./backend-server
    container_name: webinfra-backend-2
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082

  backend-3:
    build:
      context: ./backend-server
    container_name: webinfra-backend-3
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=8083

  api-gateway:
    build:
      context: ./api-gateway
    container_name: webinfra-api-gateway
    ports:
      - "8090:8090"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GATEWAY_BACKENDS=http://backend-1:8081,http://backend-2:8082,http://backend-3:8083
    depends_on:
      - redis
      - backend-1
      - backend-2
      - backend-3
